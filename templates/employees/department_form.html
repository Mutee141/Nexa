{% extends 'base.html' %}
{% block title %}New Department — NexaOps{% endblock %}
{% block page_title %}New Department{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="flex items-center gap-3 mb-6">
        <a href="{% url 'department_list' %}"
            class="text-gray-400 hover:text-gray-600 p-2 hover:bg-gray-100 rounded-lg">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <h2 class="text-xl font-bold text-gray-900">Create Department</h2>
    </div>
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Department Name <span
                        class="text-red-500">*</span></label>
                <input type="text" name="name" required placeholder="e.g. Engineering"
                    class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div class="mb-5">
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Description</label>
                <textarea name="description" rows="3" placeholder="What does this department do?"
                    class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none"></textarea>
            </div>
            <div class="flex gap-3">
                <button type="submit"
                    class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-xl text-sm font-medium transition">
                    <i class="fa-solid fa-plus mr-1"></i> Create Department
                </button>
                <a href="{% url 'department_list' %}"
                    class="flex-1 text-center border border-gray-200 text-gray-600 hover:bg-gray-50 py-2.5 rounded-xl text-sm font-medium transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
