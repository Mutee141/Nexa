{% if notifications %}
{% for notif in notifications %}
<a href="{% if notif.link %}{{ notif.link }}{% else %}{% url 'notification_list' %}{% endif %}"
    onclick="markRead({{ notif.pk }})"
    class="flex items-start gap-3 px-4 py-3 hover:bg-gray-50 transition {% if not notif.is_read %}bg-indigo-50/50{% endif %}">

    <!-- Icon -->
    <div class="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0 mt-0.5
        {% if notif.get_color == 'indigo' %}bg-indigo-100
        {% elif notif.get_color == 'red' %}bg-red-100
        {% elif notif.get_color == 'green' %}bg-green-100
        {% elif notif.get_color == 'violet' %}bg-violet-100
        {% elif notif.get_color == 'amber' %}bg-amber-100
        {% elif notif.get_color == 'blue' %}bg-blue-100
        {% elif notif.get_color == 'teal' %}bg-teal-100
        {% else %}bg-gray-100{% endif %}">
        <i class="fa-solid {{ notif.get_icon }} text-sm
            {% if notif.get_color == 'indigo' %}text-indigo-600
            {% elif notif.get_color == 'red' %}text-red-500
            {% elif notif.get_color == 'green' %}text-green-600
            {% elif notif.get_color == 'violet' %}text-violet-600
            {% elif notif.get_color == 'amber' %}text-amber-500
            {% elif notif.get_color == 'blue' %}text-blue-600
            {% elif notif.get_color == 'teal' %}text-teal-600
            {% else %}text-gray-500{% endif %}"></i>
    </div>

    <!-- Content -->
    <div class="flex-1 min-w-0">
        <p class="text-xs font-semibold text-gray-800 truncate">{{ notif.title }}</p>
        <p class="text-xs text-gray-500 mt-0.5 line-clamp-2 leading-relaxed">{{ notif.message }}</p>
        <p class="text-xs text-gray-400 mt-1">{{ notif.created_at|timesince }} ago</p>
    </div>

    <!-- Unread dot -->
    {% if not notif.is_read %}
    <div class="w-2 h-2 bg-indigo-500 rounded-full flex-shrink-0 mt-2"></div>
    {% endif %}
</a>
{% endfor %}
{% else %}
<div class="px-4 py-10 text-center">
    <i class="fa-solid fa-bell text-3xl text-gray-200 mb-2 block"></i>
    <p class="text-sm text-gray-400">No notifications yet</p>
</div>
{% endif %}
