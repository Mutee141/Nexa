<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sign Out — NexaOps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif
        }
    </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-purple-50 flex items-center justify-center p-4">

    <div class="w-full max-w-sm text-center">
        <div class="inline-flex items-center justify-center w-14 h-14 bg-indigo-600 rounded-2xl mb-6 shadow-lg">
            <i class="fa-solid fa-brain text-white text-xl"></i>
        </div>

        <div class="bg-white rounded-3xl shadow-xl border border-gray-100 p-8">
            <div class="w-14 h-14 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-arrow-right-from-bracket text-red-500 text-xl"></i>
            </div>
            <h2 class="text-xl font-semibold text-gray-900 mb-2">Sign out?</h2>
            <p class="text-gray-500 text-sm mb-6">You will be logged out of your NexaOps account.</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit"
                    class="w-full bg-red-500 hover:bg-red-600 text-white py-2.5 rounded-xl text-sm font-semibold transition mb-3">
                    Yes, Sign Out
                </button>
                <a href="/dashboard/"
                    class="block w-full border border-gray-200 text-gray-600 hover:bg-gray-50 py-2.5 rounded-xl text-sm font-medium transition">
                    Cancel
                </a>
            </form>
        </div>
    </div>

</body>

</html>
